name: CD

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  # ── Windows: SFML static → standalone .exe ─────────────────────────────────
  build-windows:
    name: Build Windows (static)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build SFML 2.6.2 static (network + system only)
        shell: pwsh
        run: |
          git clone --depth 1 --branch 2.6.2 https://github.com/SFML/SFML.git C:/sfml-src
          cmake -S C:/sfml-src -B C:/sfml-build `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DSFML_BUILD_AUDIO=OFF `
            -DSFML_BUILD_GRAPHICS=OFF `
            -DSFML_BUILD_WINDOW=OFF `
            -DSFML_BUILD_NETWORK=ON `
            -DSFML_BUILD_SYSTEM=ON
          cmake --build C:/sfml-build --config Release
          cmake --install C:/sfml-build --config Release --prefix C:/sfml

      - name: Configure
        run: >
          cmake -B build
          -DSFML_STATIC_LIBRARIES=ON
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          -DSFML_DIR=C:/sfml/lib/cmake/SFML

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          cmake --install build --config Release --prefix dist
          Compress-Archive -Path dist/* -DestinationPath NetServer-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: NetServer-windows-x64.zip

  # ── Linux: AppImage → standalone, sin dependencias ─────────────────────────
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libsfml-dev fuse

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Download linuxdeploy
        run: |
          curl -Lo linuxdeploy.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy.AppImage

      - name: Create icon
        run: |
          python3 - <<'EOF'
          import zlib, struct

          def chunk(tag, data):
              buf = tag + data
              return struct.pack('>I', len(data)) + buf + struct.pack('>I', zlib.crc32(buf) & 0xffffffff)

          W, H, R, G, B = 256, 256, 13, 27, 42
          ihdr = struct.pack('>IIBBBBB', W, H, 8, 2, 0, 0, 0)
          raw  = b''.join(b'\x00' + bytes([R, G, B] * W) for _ in range(H))
          png  = b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')

          with open('NetServer.png', 'wb') as f:
              f.write(png)
          EOF

      - name: Create .desktop file
        run: |
          cat > NetServer.desktop <<'EOF'
          [Desktop Entry]
          Name=NetServer
          Exec=NetServer
          Icon=NetServer
          Type=Application
          Categories=Network;
          Terminal=true
          EOF

      - name: Package AppImage
        run: |
          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --executable build/Server/NetServer \
            --desktop-file NetServer.desktop \
            --icon-file NetServer.png \
            --output appimage
          mv NetServer-x86_64.AppImage NetServer-linux-x64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: NetServer-linux-x64.AppImage

  # ── GitHub Release ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: |
          echo "tag=release-$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "NetworkMiddleware ${{ steps.tag.outputs.tag }}"
          make_latest: true
          body: |
            ## NetworkMiddleware Authoritative Server

            ### Windows — standalone, sin dependencias
            **Instalar con un comando (PowerShell):**
            ```powershell
            irm https://raw.githubusercontent.com/AlexRubio14/NetworkMiddleware/main/install.ps1 | iex
            ```
            O descarga `NetServer-windows-x64.zip`, extrae y doble-click en `NetServer.exe`.

            ### Linux — standalone AppImage, sin dependencias
            **Instalar con un comando (bash):**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/AlexRubio14/NetworkMiddleware/main/install.sh | bash
            ```
            O descarga `NetServer-linux-x64.AppImage`, hazlo ejecutable y ejecútalo:
            ```bash
            chmod +x NetServer-linux-x64.AppImage && ./NetServer-linux-x64.AppImage
            ```
          files: |
            windows-x64/NetServer-windows-x64.zip
            linux-x64/NetServer-linux-x64.AppImage

  # ── Docker: imagen multi-arch (amd64 + arm64) → GHCR ────────────────────────
  docker-publish:
    name: Publish Docker (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push NetServer
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/netserver:latest
            ghcr.io/${{ steps.owner.outputs.name }}/netserver:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push HeadlessBot
        uses: docker/build-push-action@v5
        with:
          context: .
          target: bot
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.owner.outputs.name }}/headlessbot:latest
            ghcr.io/${{ steps.owner.outputs.name }}/headlessbot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
